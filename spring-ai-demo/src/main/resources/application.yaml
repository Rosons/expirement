spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/spring_ai_demo?characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}

  flyway:
    baseline-on-migrate: true
    locations: classpath:db/migration
    encoding: UTF-8
    validate-on-migrate: true
    enabled: true

  application:
    name: spring-ai-demo

  ai:
    chat:
      client:
        enabled: false
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: sk-020127f24b3742b5bb3094b98dead8bb
      chat:
        options:
          model: glm-4.7
      embedding:
        options:
          dimensions: 1024
          model: text-embedding-v3
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
server:
  port: 8080

app:
  file-storage:
    root-dir: ${APP_FILE_STORAGE_ROOT:./data/chat-files}
  vector-store:
    # 向量持久化文件根路径（文件名固定为 simple-vector-store.json）
    persist-root-dir: ${APP_VECTOR_STORE_ROOT:./data/vector-store}
    # 删除文件时用于检索待删向量文档的上限；文档切片较多时可适当调大
    delete-search-top-k: 1000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-not-delete-value: 0
      logic-delete-value: 1

logging:
  level:
    org.springframework.ai: DEBUG
    com.aliyun: DEBUG
