spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    # DB_HOST / DB_PORT / DB_NAME：与 Docker Compose、本地环境变量一致
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:spring_ai_demo}?characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}

  flyway:
    baseline-on-migrate: true
    locations: classpath:db/migration
    encoding: UTF-8
    validate-on-migrate: true
    enabled: true

  application:
    name: spring-ai-demo

  ai:
    chat:
      client:
        enabled: false
    openai:
      # 对应环境变量：SPRING_AI_OPENAI_BASE_URL、SPRING_AI_OPENAI_API_KEY 等（Spring Boot 亦支持 relaxed binding）
      base-url: ${SPRING_AI_OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      api-key: ${SPRING_AI_OPENAI_API_KEY:}
      chat:
        options:
          model: ${SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL:glm-4.7}
      embedding:
        options:
          dimensions: ${SPRING_AI_OPENAI_EMBEDDING_OPTIONS_DIMENSIONS:1024}
          model: ${SPRING_AI_OPENAI_EMBEDDING_OPTIONS_MODEL:text-embedding-v3}
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
server:
  port: ${SERVER_PORT:8080}

app:
  file-storage:
    root-dir: ${APP_FILE_STORAGE_ROOT:./data/chat-files}
  vector-store:
    # 向量持久化文件根路径（文件名固定为 simple-vector-store.json）
    persist-root-dir: ${APP_VECTOR_STORE_ROOT:./data/vector-store}
    # 删除文件时用于检索待删向量文档的上限；文档切片较多时可适当调大
    delete-search-top-k: 10000
    splitter:
      # 每个分片的目标 token 数，通用场景建议 300~800
      chunk-size: 500
      # 分片最小字符数，防止出现过短碎片
      min-chunk-size-chars: 100
      # 小于该字符数的分片不做向量化，减少噪声
      min-chunk-length-to-embed: 30
      # 单个文档最多分片数量，避免超大文档导致内存和耗时失控
      max-num-chunks: 10000
      # 是否保留标点和分隔符，通用检索建议开启
      keep-separator: true
  # 多模态模型名称（环境变量 APP_MULTIMODAL_MODEL_NAME）
  multimodal-model-name: ${APP_MULTIMODAL_MODEL_NAME:qwen3.5-omni-flash}

  # 知识库对话（QuestionAnswerAdvisor / RAG）向量检索时的检索请求参数
  knowledge-chat:
    rag:
      # 相似度下限：低于该阈值的向量片段不会作为上下文注入；调高可减少无关内容，调低可增加召回
      # 环境变量：APP_KNOWLEDGE_CHAT_RAG_SIMILARITY_THRESHOLD
      similarity-threshold: ${APP_KNOWLEDGE_CHAT_RAG_SIMILARITY_THRESHOLD:0.5}
      # 返回与查询最相近的片段条数上限；越大上下文越丰富，但噪声与 token 消耗也可能增加
      # 环境变量：APP_KNOWLEDGE_CHAT_RAG_TOP_K
      top-k: ${APP_KNOWLEDGE_CHAT_RAG_TOP_K:3}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    # 1. 指定日志实现类为标准输出
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-not-delete-value: 0
      logic-delete-value: 1

logging:
  level:
    org.springframework.ai: DEBUG
    com.aliyun: DEBUG
