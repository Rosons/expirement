# 与 vite.config.ts 开发代理路径对齐；反代到 compose 服务 backend:8080
# 生产环境 VITE_API_BASE 为空时，浏览器请求同源的 /v1/ai、/ai/files 等，由此转发到 Spring Boot

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 与 Spring multipart max-file-size / max-request-size 对齐；默认 1m 会导致大文件上传 413
    client_max_body_size 100m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 流式接口：关闭缓冲，避免 SSE / fetch 流被截断
    location ~ ^/(v1/ai|v2/ai|game/ai|knowledge/ai|customer/ai|ai/files|ai/test)(/|$) {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }
}
